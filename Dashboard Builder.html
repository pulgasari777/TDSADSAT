function applydatefilter(start, end,cols,chart,xy, colname, data1, data2) {

		datax = data1[0];
		datay = data2[0];
		fromDate=new Date(start);
		toDate=new Date(end);

		let newx = [];
		let newy = [];
		j=0;
		for (i=0; i<datax.length; i++) {
			d = new Date(datax[i]);
			if (d >= fromDate && d <= toDate) {
				newx[j] = datax[i];
				newy[j]=datay[i];
				j++;
			}
		}


		for (i=0; i<cols.length; i++) {
		 
		 	if (xy[i]=="X") {
			var update = {
					x: [newx],
					values: [newx],

				} 
			} else {
				var update = {

					y: [newx],
					labels: [newx]
				}
				
			}
		
			DashboardBuilder.restyle('col'+cols[i], update); 
		}
	
}

function applynumberfilter(start,end,cols,chart,xy, colname, data1, data2) {
	
		if (xy=="X") {
		datax = data1[0];
		datay = data2[0];
		var newx = datax.filter(
				function (v) {
					return v <= end && v >= start;
				}
		);
		} else {
			datax = data2[0];
			datay = data1[0];
			var newy = datay.filter(
				function (v) {
					return v <= end && v >= start;
				}
			);
		}

		
		for (i=0; i<cols.length; i++) {
		 	if (xy[i]=="X") {
			var update = {
					x: [newx],
					values: [newx],
					y: [newy],
					labels: [newy]
				} 
			} else {
				var update = {
					x: [newy],
					values: [newy],
					y: [newx],
					labels: [newx]
				}
				
			}
		
			DashboardBuilder.restyle('col'+cols[i], update); 
		}
	
}

function x_y_sort(x, y, i, o) {
	
 var list = [];
  for (var j = 0; j < x.length; j++)  {
	if (Number(x[j])) {
		x[j] = Number(x[j]); 
	}
	if (Number(y[j])) {
		y[j] = Number(y[j]); 
	}
    list.push({'x': x[j], 'y': y[j]});
  }

  
 if (o==1) { // if X data
	if (document.getElementById("sort-x-icon"+i).classList.contains('fa-sort-amount-asc') ){
		list.sort(function(a, b) {
		return ((a.x < b.x) ? -1 : ((a.x == b.x) ? 0 : 1));
		});
		document.getElementById("sort-x-icon"+i).className = 'fa fa-sort-amount-desc';
	} else {
		list.sort(function(a, b) {
		return ((a.x > b.x) ? -1 : ((a.x == b.x) ? 0 : 1));
		});
		document.getElementById("sort-x-icon"+i).className = 'fa fa-sort-amount-asc';
	}
 } else {  // Y data
	 if (document.getElementById("sort-y-icon"+i).classList.contains('fa-sort-amount-asc') ){
		list.sort(function(a, b) {
		return ((a.y < b.y) ? -1 : ((a.y == b.y) ? 0 : 1));
		});
		document.getElementById("sort-y-icon"+i).className = 'fa fa-sort-amount-desc';
	} else {
		list.sort(function(a, b) {
		return ((a.y > b.y) ? -1 : ((a.y == b.y) ? 0 : 1));
		});
		document.getElementById("sort-y-icon"+i).className = 'fa fa-sort-amount-asc';
	} 
 } 

	selectxid = 'x-filter'+i;
	selectyid = 'y-filter'+i;
	var xhtml="";
	var yhtml="";

  for (var h = 0; h < list.length; h++) {
	xhtml += '<option value="'+list[h].x+'" selected="selected">'+list[h].x+'</option>';
	document.getElementById(selectxid).innerHTML = xhtml;
	yhtml += '<option value="'+list[h].y+'" selected="selected">'+list[h].y+'</option>';
	document.getElementById(selectyid).innerHTML = yhtml;
  }
 
}


function exchange(x, y, i) {
	selectxid = 'x-filter'+i;
	selectyid = 'y-filter'+i;
	var xhtml="";
	var yhtml="";

	e = document.getElementById('exchange'+i);
	d = "data-exchange";

		t = x;
		x = y;
		y = t;

	if (e.getAttribute(d)=="x2y") {
	for (var h = 0; h < x.length; h++) {
		xhtml += '<option value="'+x[h]+'" selected="selected">'+x[h]+'</option>';
		document.getElementById(selectxid).innerHTML = xhtml;
		yhtml += '<option value="'+y[h]+'" selected="selected">'+y[h]+'</option>';
		document.getElementById(selectyid).innerHTML = yhtml;
    }
	  e.setAttribute(d, "y2x"); 
	} else {
	for (var h = 0; h < x.length; h++) {
		xhtml += '<option value="'+y[h]+'" selected="selected">'+y[h]+'</option>';
		document.getElementById(selectxid).innerHTML = xhtml;
		yhtml += '<option value="'+x[h]+'" selected="selected">'+x[h]+'</option>';
		document.getElementById(selectyid).innerHTML = yhtml;
    }
	  e.setAttribute(d, "x2y"); 
	}
 
}

function numShort (n) {
maxv = n;
maxu ='';
if (maxv > 1000000) {
maxv =  (maxv / 1000000).toFixed(1).replace(/\.0$/, '');;
maxu = 'M';
} else {
if (maxv >= 1000) {
maxv = (maxv / 1000).toFixed(1).replace(/\.0$/, '');
maxu = 'K';
}
}
return [maxv, maxu];
}

function download_table_as_csv(table_id, separator = ',') {
    var rows = document.querySelectorAll('table#' + table_id + ' tr');
    var csv = [];
    for (var i = 0; i < rows.length; i++) {
        var row = [], cols = rows[i].querySelectorAll('td, th');
        for (var j = 0; j < cols.length; j++) {
            var data = cols[j].innerText.replace(/(\r\n|\n|\r)/gm, '').replace(/(\s\s)/gm, ' ')
            data = data.replace(/"/g, '""');
            row.push('"' + data + '"');
        }
        csv.push(row.join(separator));
    }
    var csv_string = csv.join('\n');
    var filename = 'export_chart.csv';
    var link = document.createElement('a');
    link.style.display = 'none';
    link.setAttribute('target', '_blank');
    link.setAttribute('href', 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv_string));
    link.setAttribute('download', filename);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}


function pdfDownload(idd) { 


	const id = document.getElementById(idd);
	
	var scrollHeight = id.scrollHeight;
	var clientHeight = id.clientHeight;
	
	var HTML_Width = $(id).width();
    var HTML_Height = $(id).height();
    var top_left_margin = 15;
    var PDF_Width = HTML_Width + (top_left_margin * 2);
    var PDF_Height = (PDF_Width * 1.5) + (top_left_margin * 2);
    var canvas_image_height = window.outerHeight*1.5;
    var canvas_image_width = window.outerWidth/2;
	
	
html2canvas($(id)[0], {
            allowTaint: true,
            useCORS: true,
            logging: false,
            height: scrollHeight + clientHeight-40,
            windowHeight: scrollHeight + clientHeight,
}).then(function (canvas) {
        var imgData = canvas.toDataURL("image/jpeg", 1.0);
        var pdf = new jsPDF('p', 'pt', [PDF_Width, PDF_Height]);
        pdf.addImage(imgData, 'JPG', (top_left_margin+40), top_left_margin, canvas_image_width, canvas_image_height);
        pdf.save("dashboardbuilder.pdf");
    });
	
}
